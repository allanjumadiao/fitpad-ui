<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitpad Coach Portal - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #535353;
        }
        .brand-yellow { color: #d8f511; }
        .bg-brand-yellow { background-color: #d8f511; }
        .border-brand-yellow { border-color: #d8f511; }
        
        /* Custom Ring for Focus */
        .focus-brand:focus {
            outline: none;
            box-shadow: 0 0 0 2px rgba(216, 245, 17, 0.5);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-auto max-w-md">
        <div class="flex flex-col items-center mb-8">
            <img src="images/fitpad-fitness.png" alt="Fitpad Logo" class="w-24 h-auto mb-4">
            <h1 class="brand-yellow text-3xl font-bold tracking-[0.3em] uppercase">Fitpad</h1>
            <p class="text-gray-300 mt-2 text-sm">Coach Portal</p>
        </div>

        <div class="bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-2xl border border-white/10">
            <form action="coach-screen/dashboard.html" method="POST" class="space-y-6">
                
                <div>
                    <label for="coach-id" class="block text-sm font-semibold text-gray-200 mb-2">Coach ID</label>
                    <input type="text" value="CO-001" id="coach-id" name="coach_id" required 
                        placeholder="Enter your Coach ID"
                        class="w-full px-4 py-3 bg-white/5 border border-gray-500 rounded-lg text-white placeholder-gray-400 focus-brand transition-all">
                </div>

                <div>
                    <div class="flex justify-between mb-2">
                        <label for="password" class="text-sm font-semibold text-gray-200">Password</label>
                        <a href="#" class="brand-yellow text-xs hover:underline">Forgot Password?</a>
                    </div>
                    <input type="password" value="password" id="password" name="password" required minlength="8"
                        placeholder="••••••••"
                        class="w-full px-4 py-3 bg-white/5 border border-gray-500 rounded-lg text-white placeholder-gray-400 focus-brand transition-all">
                </div>

                <button type="submit" 
                    class="w-full bg-brand-yellow text-[#535353] font-bold py-3 rounded-lg hover:brightness-110 active:scale-[0.98] transition-all uppercase tracking-wider">
                    Sign In
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-white/10 text-center">
                <a href="coach-screen/change-password.html" class="text-gray-400 text-sm hover:text-white transition-colors">
                    Forgot Password?
                </a>
            </div>
        </div>

        <p class="text-center text-gray-500 text-[10px] mt-6 px-8 uppercase tracking-widest leading-relaxed">
            Authorized Personnel Only. <br>
            Security: 5 attempt limit applies.
        </p>
    </div>

</body>
</html>
