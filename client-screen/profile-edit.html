<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitpad - Edit Client Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;900&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F3F4F6; }
        .brand-yellow { color: #d8f511; }
        .bg-brand-yellow { background-color: #d8f511; }
        .bg-fitpad-gray { background-color: #535353; }
        .text-fitpad-gray { color: #535353; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <!-- CLIENT SIDEBAR (DESKTOP) -->
    <aside class="hidden md:flex flex-col w-64 bg-fitpad-gray text-white h-screen sticky top-0 z-40">
        
        <!-- Logo Area -->
        <div class="p-8">
            <img src="../images/fitpad-fitness.png" alt="Fitpad Logo" class="h-10 w-auto object-contain">
        </div>

        <!-- Navigation Links -->
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="dashboard.html" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-white rounded-xl transition-all group">
                <ion-icon name="grid-outline" class="text-xl group-hover:text-brand-yellow transition-colors"></ion-icon>
                <span class="text-sm font-semibold">Dashboard</span>
            </a>
            
            <a href="session-list.html" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-white rounded-xl transition-all group">
                <ion-icon name="calendar-outline" class="text-xl group-hover:text-brand-yellow transition-colors"></ion-icon>
                <span class="text-sm font-semibold">Session List</span>
            </a>
            
            <a href="session-screen.html" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-white rounded-xl transition-all group">
                <ion-icon name="fitness-outline" class="text-xl group-hover:text-brand-yellow transition-colors"></ion-icon>
                <span class="text-sm font-semibold">Session Screen</span>
            </a>
            
            <!-- Client Profile (Active) -->
            <a href="profile.html" class="flex items-center gap-4 px-4 py-4 bg-white/10 text-white rounded-xl border-l-4 border-brand-yellow transition-all shadow-sm">
                <ion-icon name="person" class="text-xl brand-yellow"></ion-icon>
                <span class="text-sm font-bold">My Profile</span>
            </a>
        </nav>

        <div class="p-4 mb-4">
            <a href="../client-login.html" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-red-400 rounded-xl transition-all">
                <ion-icon name="log-out-outline" class="text-xl"></ion-icon>
                <span class="text-sm font-semibold">Log Out</span>
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 p-4 md:p-10 mb-20 md:mb-0 overflow-x-hidden">
        
        <div class="max-w-4xl mx-auto">
            
            <!-- Breadcrumbs & Header -->
            <header class="mb-8">
                <div class="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-widest mb-3">
                    <a href="profile.html" class="hover:text-fitpad-gray transition-colors">My Profile</a>
                    <ion-icon name="chevron-forward-outline"></ion-icon>
                    <span class="text-brand-yellow">Edit Mode</span>
                </div>
                <div>
                    <h2 class="text-3xl font-bold text-fitpad-gray uppercase tracking-tight">Edit Profile</h2>
                    <p class="text-gray-500 text-sm">Update your personal information and fitness metrics.</p>
                </div>
            </header>

            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('Profile updated successfully!');">
                
                <!-- COVER & AVATAR SECTION -->
                <section class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden mb-8">
                    <!-- Cover Photo -->
                    <div class="h-32 bg-fitpad-gray relative group cursor-pointer transition-all">
                        <div class="absolute inset-0 opacity-10 flex items-center justify-center">
                            <h1 class="text-white text-6xl font-bold tracking-[1em]">FITPAD</h1>
                        </div>
                        <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center transition-all">
                            <span class="text-white text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                                <ion-icon name="image-outline" class="text-lg"></ion-icon> Change Cover
                            </span>
                        </div>
                    </div>
                    
                    <div class="px-8 pb-8">
                        <div class="relative flex flex-col md:flex-row md:items-end gap-6 -mt-12">
                            <!-- Avatar Edit -->
                            <div class="relative group cursor-pointer">
                                <div class="w-32 h-32 rounded-3xl bg-brand-yellow border-4 border-white shadow-lg flex items-center justify-center text-fitpad-gray text-4xl font-black transition-all group-hover:brightness-90">
                                    JD
                                </div>
                                <div class="absolute inset-0 bg-black/40 rounded-3xl hidden group-hover:flex items-center justify-center border-4 border-white transition-all">
                                    <ion-icon name="camera-outline" class="text-white text-3xl"></ion-icon>
                                </div>
                            </div>
                            
                            <div class="flex-1 pb-2">
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div>
                                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">First Name</label>
                                        <input type="text" value="Jane" required class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl text-sm font-bold text-fitpad-gray outline-none focus:ring-2 focus:ring-[#d8f511]/50 transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Last Name</label>
                                        <input type="text" value="Doe" required class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl text-sm font-bold text-fitpad-gray outline-none focus:ring-2 focus:ring-[#d8f511]/50 transition-all">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Basic Details Form -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8 pt-8 border-t border-gray-50">
                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Email Address</label>
                                <input type="email" value="jane.doe@example.com" required class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl text-sm font-bold text-fitpad-gray outline-none focus:ring-2 focus:ring-[#d8f511]/50 transition-all">
                            </div>
                            
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Date of Birth</label>
                                <input type="date" id="birthday" value="1994-10-12" required onchange="calculateAge()" class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl text-sm font-bold text-fitpad-gray outline-none focus:ring-2 focus:ring-[#d8f511]/50 transition-all cursor-pointer">
                            </div>
                            
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Current Age</label>
                                <input type="text" id="ageDisplay" value="31" readonly class="w-full bg-gray-100 border border-gray-200 p-3 rounded-xl text-sm font-mono text-gray-500 cursor-not-allowed">
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Height (cm)</label>
                                <input type="number" step="0.1" value="165" required class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl text-sm font-bold text-fitpad-gray outline-none focus:ring-2 focus:ring-[#d8f511]/50 transition-all">
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Weight (kg)</label>
                                <input type="number" step="0.1" value="65.2" required class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl text-sm font-bold text-fitpad-gray outline-none focus:ring-2 focus:ring-[#d8f511]/50 transition-all">
                            </div>

                            <div class="md:col-span-2">
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1">Primary Fitness Goal</label>
                                <select class="w-full bg-gray-50 border border-gray-200 p-3 rounded-xl text-sm font-bold text-fitpad-gray outline-none focus:ring-2 focus:ring-[#d8f511]/50 transition-all cursor-pointer">
                                    <option value="weight_loss" selected>Weight Loss / HIIT</option>
                                    <option value="muscle_gain">Muscle Gain / Hypertrophy</option>
                                    <option value="endurance">Endurance & Stamina</option>
                                    <option value="flexibility">Flexibility & Mobility</option>
                                    <option value="general_fitness">General Fitness & Maintenance</option>
                                    <option value="rehabilitation">Rehabilitation / Injury Recovery</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- Form Action Buttons -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 flex flex-col sm:flex-row justify-end gap-4 items-center">
                    <button type="button" onclick="window.history.back();" class="text-xs font-bold text-gray-400 uppercase tracking-widest hover:text-fitpad-gray transition-colors px-4 py-2">
                        Cancel
                    </button>
                    <button type="submit" class="bg-brand-yellow text-fitpad-gray w-full sm:w-auto px-10 py-4 rounded-xl text-xs font-black uppercase tracking-widest hover:brightness-110 transition-all shadow-md">
                        Save Profile Changes
                    </button>
                </div>

            </form>
        </div>

    </main>

    <!-- CLIENT MOBILE BOTTOM NAVIGATION -->
    <nav class="md:hidden fixed bottom-0 inset-x-0 bg-fitpad-gray text-white px-2 py-4 flex justify-around items-center z-50 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.3)]">
        <a href="dashboard.html" class="flex flex-col items-center text-gray-400 hover:text-white transition-colors">
            <ion-icon name="grid-outline" class="text-2xl"></ion-icon>
            <span class="text-[9px] font-bold mt-1 tracking-widest uppercase">Dash</span>
        </a>
        <a href="session-list.html" class="flex flex-col items-center text-gray-400 hover:text-white transition-colors">
            <ion-icon name="calendar-outline" class="text-2xl"></ion-icon>
            <span class="text-[9px] font-bold mt-1 tracking-widest uppercase">List</span>
        </a>
        <a href="session.html" class="flex flex-col items-center text-gray-400 hover:text-white transition-colors">
            <ion-icon name="fitness-outline" class="text-2xl"></ion-icon>
            <span class="text-[9px] font-bold mt-1 tracking-widest uppercase">Active</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center brand-yellow transition-colors">
            <ion-icon name="person" class="text-2xl"></ion-icon>
            <span class="text-[9px] font-bold mt-1 tracking-widest uppercase">Profile</span>
        </a>
    </nav>

    <!-- Auto-calculate age script -->
    <script>
        // Ensure users cannot pick a future date for their birthday
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('birthday').setAttribute('max', today);

        function calculateAge() {
            const birthdayInput = document.getElementById('birthday').value;
            if (!birthdayInput) return;

            const birthDate = new Date(birthdayInput);
            const todayDate = new Date();
            
            let age = todayDate.getFullYear() - birthDate.getFullYear();
            const m = todayDate.getMonth() - birthDate.getMonth();
            
            if (m < 0 || (m === 0 && todayDate.getDate() < birthDate.getDate())) {
                age--;
            }
            
            document.getElementById('ageDisplay').value = age;
        }
    </script>
</body>
</html>
