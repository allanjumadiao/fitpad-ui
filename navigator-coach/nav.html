<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitpad Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f3f4f6; }
        .brand-yellow { color: #d8f511; }
        .bg-brand-yellow { background-color: #d8f511; }
        .bg-fitpad-gray { background-color: #535353; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <aside class="hidden md:flex flex-col w-64 bg-fitpad-gray text-white h-screen sticky top-0">
        <div class="p-6">
            <h1 class="brand-yellow text-xl font-bold tracking-widest uppercase">Fitpad</h1>
            <p class="text-[10px] text-gray-400">COACH PORTAL</p>
        </div>
        
        <nav class="flex-1 mt-4 px-4 space-y-2">
            <a href="#" class="flex items-center gap-4 px-4 py-3 bg-white/10 text-white rounded-lg border-l-4 border-brand-yellow">
                <ion-icon name="grid-outline" class="text-xl brand-yellow"></ion-icon>
                <span class="text-sm font-semibold">Coach Dashboard</span>
            </a>
            
            <a href="#" class="flex items-center gap-4 px-4 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-lg transition-all">
                <ion-icon name="people-outline" class="text-xl"></ion-icon>
                <span class="text-sm font-semibold">Client List</span>
            </a>
            
            <a href="#" class="flex items-center gap-4 px-4 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-lg transition-all">
                <ion-icon name="calendar-outline" class="text-xl"></ion-icon>
                <span class="text-sm font-semibold">Session Screen</span>
            </a>

            <a href="#" class="flex items-center gap-4 px-4 py-3 text-gray-400 hover:bg-white/5 hover:text-white rounded-lg transition-all">
                <ion-icon name="person-outline" class="text-xl"></ion-icon>
                <span class="text-sm font-semibold">Coach Profile</span>
            </a>
        </nav>

        <div class="p-6 border-t border-white/10">
            <button class="text-xs text-gray-400 hover:text-red-400 transition-colors">Sign Out</button>
        </div>
    </aside>

    <main class="flex-1 p-6 mb-20 md:mb-0">
        <header class="mb-8">
            <h2 class="text-2xl font-bold text-[#535353]">Coach Dashboard</h2>
            <p class="text-gray-500 text-sm">Welcome back, Coach.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="h-32 bg-white rounded-xl shadow-sm border border-gray-200"></div>
            <div class="h-32 bg-white rounded-xl shadow-sm border border-gray-200"></div>
            <div class="h-32 bg-white rounded-xl shadow-sm border border-gray-200"></div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-fitpad-gray text-white border-t border-white/10 px-2 py-3 flex justify-around items-center z-50">
        <a href="#" class="flex flex-col items-center brand-yellow">
            <ion-icon name="grid" class="text-2xl"></ion-icon>
            <span class="text-[10px] mt-1 uppercase font-bold tracking-tighter">Dash</span>
        </a>

        <a href="#" class="flex flex-col items-center text-gray-400">
            <ion-icon name="people-outline" class="text-2xl"></ion-icon>
            <span class="text-[10px] mt-1 uppercase font-bold tracking-tighter">Clients</span>
        </a>

        <a href="#" class="flex flex-col items-center text-gray-400">
            <ion-icon name="calendar-outline" class="text-2xl"></ion-icon>
            <span class="text-[10px] mt-1 uppercase font-bold tracking-tighter">Sessions</span>
        </a>

        <a href="#" class="flex flex-col items-center text-gray-400">
            <ion-icon name="person-outline" class="text-2xl"></ion-icon>
            <span class="text-[10px] mt-1 uppercase font-bold tracking-tighter">Profile</span>
        </a>
    </nav>

</body>
</html>
