<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitpad - Admin Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;900&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F3F4F6; }
        .brand-yellow { color: #d8f511; }
        .bg-brand-yellow { background-color: #d8f511; }
        .bg-fitpad-gray { background-color: #535353; }
        .text-fitpad-gray { color: #535353; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <!-- ADMIN SIDEBAR (DESKTOP) -->
    <aside class="hidden md:flex flex-col w-64 bg-fitpad-gray text-white h-screen sticky top-0 z-40">
        
        <!-- Logo Area -->
        <div class="p-8">
            <img src="images/fitpad-fitness.png" alt="Fitpad Logo" class="h-10 w-auto object-contain">
            <div class="mt-2 text-[9px] font-bold text-gray-400 uppercase tracking-[0.2em]">Admin Portal</div>
        </div>

        <!-- Navigation Links -->
        <nav class="flex-1 px-4 space-y-2 mt-4 overflow-y-auto">
            
            <!-- Dashboard (Active State Example) -->
            <a href="#" class="flex items-center gap-4 px-4 py-4 bg-white/10 text-white rounded-xl border-l-4 border-brand-yellow transition-all shadow-sm">
                <ion-icon name="grid" class="text-xl brand-yellow"></ion-icon>
                <span class="text-sm font-bold">Admin Dashboard</span>
            </a>
            
            <!-- Coach List (Inactive State) -->
            <a href="#" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-white rounded-xl transition-all group">
                <ion-icon name="id-card-outline" class="text-xl group-hover:text-brand-yellow transition-colors"></ion-icon>
                <span class="text-sm font-semibold">Coach List</span>
            </a>
            
            <!-- Client List (Inactive State) -->
            <a href="#" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-white rounded-xl transition-all group">
                <ion-icon name="people-outline" class="text-xl group-hover:text-brand-yellow transition-colors"></ion-icon>
                <span class="text-sm font-semibold">Client List</span>
            </a>
            
            <!-- Session List (Inactive State) -->
            <a href="#" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-white rounded-xl transition-all group">
                <ion-icon name="calendar-outline" class="text-xl group-hover:text-brand-yellow transition-colors"></ion-icon>
                <span class="text-sm font-semibold">Session List</span>
            </a>

            <!-- Admin Settings (Inactive State) -->
            <a href="#" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-white rounded-xl transition-all group mt-6 border-t border-white/5 pt-6">
                <ion-icon name="settings-outline" class="text-xl group-hover:text-brand-yellow transition-colors"></ion-icon>
                <span class="text-sm font-semibold">Administration</span>
            </a>

        </nav>

        <!-- Bottom Actions -->
        <div class="p-4 mb-4">
            <a href="#" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-red-400 rounded-xl transition-all">
                <ion-icon name="log-out-outline" class="text-xl"></ion-icon>
                <span class="text-sm font-semibold">Log Out</span>
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 p-4 md:p-10 mb-24 md:mb-0 overflow-x-hidden">
        
        <!-- Header -->
        <header class="mb-8 flex justify-between items-center">
            <div>
                <div class="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
                    <span>System Overview</span>
                </div>
                <h2 class="text-3xl font-black text-fitpad-gray uppercase tracking-tight">Admin Dashboard</h2>
            </div>
            
            <!-- Admin Profile Indicator -->
            <div class="flex items-center gap-4">
                <div class="hidden md:block text-right">
                    <p class="text-sm font-bold text-fitpad-gray">System Admin</p>
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">ID: ADM-001</p>
                </div>
                <div class="w-12 h-12 rounded-2xl bg-fitpad-gray flex items-center justify-center text-brand-yellow font-black shadow-sm border-2 border-gray-200">
                    <ion-icon name="shield-checkmark" class="text-2xl"></ion-icon>
                </div>
            </div>
        </header>

        <!-- Content Placeholder -->
        <div class="border-4 border-dashed border-gray-200 rounded-3xl h-[60vh] flex flex-col items-center justify-center text-gray-400 font-bold uppercase tracking-widest text-sm bg-gray-50/50">
            <ion-icon name="construct-outline" class="text-4xl mb-4 text-gray-300"></ion-icon>
            [ Admin Main Content Block ]
        </div>

    </main>

    <!-- ADMIN MOBILE BOTTOM NAVIGATION -->
    <nav class="md:hidden fixed bottom-0 inset-x-0 bg-fitpad-gray text-white px-1 py-4 flex justify-around items-center z-50 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.3)]">
        
        <!-- Dashboard (Active) -->
        <a href="#" class="flex flex-col items-center brand-yellow transition-colors w-1/5">
            <ion-icon name="grid" class="text-2xl"></ion-icon>
            <span class="text-[8px] sm:text-[9px] font-bold mt-1 tracking-widest uppercase truncate">Dash</span>
        </a>
        
        <!-- Coach List -->
        <a href="#" class="flex flex-col items-center text-gray-400 hover:text-white transition-colors w-1/5">
            <ion-icon name="id-card-outline" class="text-2xl"></ion-icon>
            <span class="text-[8px] sm:text-[9px] font-bold mt-1 tracking-widest uppercase truncate">Coaches</span>
        </a>
        
        <!-- Client List -->
        <a href="#" class="flex flex-col items-center text-gray-400 hover:text-white transition-colors w-1/5">
            <ion-icon name="people-outline" class="text-2xl"></ion-icon>
            <span class="text-[8px] sm:text-[9px] font-bold mt-1 tracking-widest uppercase truncate">Clients</span>
        </a>

        <!-- Session List -->
        <a href="#" class="flex flex-col items-center text-gray-400 hover:text-white transition-colors w-1/5">
            <ion-icon name="calendar-outline" class="text-2xl"></ion-icon>
            <span class="text-[8px] sm:text-[9px] font-bold mt-1 tracking-widest uppercase truncate">Sessions</span>
        </a>
        
        <!-- Admin Settings -->
        <a href="#" class="flex flex-col items-center text-gray-400 hover:text-white transition-colors w-1/5">
            <ion-icon name="settings-outline" class="text-2xl"></ion-icon>
            <span class="text-[8px] sm:text-[9px] font-bold mt-1 tracking-widest uppercase truncate">Settings</span>
        </a>

    </nav>

</body>
</html>
