<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitpad - Client Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;900&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #F3F4F6; }
        .brand-yellow { color: #d8f511; }
        .bg-brand-yellow { background-color: #d8f511; }
        .bg-fitpad-gray { background-color: #535353; }
        .text-fitpad-gray { color: #535353; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <!-- CLIENT SIDEBAR (DESKTOP) -->
    <aside class="hidden md:flex flex-col w-64 bg-fitpad-gray text-white h-screen sticky top-0 z-40">
        
        <!-- Logo Area -->
        <div class="p-8">
            <!-- Using the newly added logo image -->
            <img src="images/fitpad-fitness.png" alt="Fitpad Logo" class="h-10 w-auto object-contain">
        </div>

        <!-- Navigation Links -->
        <nav class="flex-1 px-4 space-y-2 mt-4">
            
            <!-- Dashboard (Active State Example) -->
            <a href="#" class="flex items-center gap-4 px-4 py-4 bg-white/10 text-white rounded-xl border-l-4 border-brand-yellow transition-all">
                <ion-icon name="grid" class="text-xl brand-yellow"></ion-icon>
                <span class="text-sm font-bold">Dashboard</span>
            </a>
            
            <!-- Session List (Inactive State) -->
            <a href="#" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-white rounded-xl transition-all group">
                <ion-icon name="calendar-outline" class="text-xl group-hover:text-brand-yellow transition-colors"></ion-icon>
                <span class="text-sm font-semibold">Session List</span>
            </a>
            
            <!-- Session Screen (Inactive State) -->
            <a href="#" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-white rounded-xl transition-all group">
                <ion-icon name="fitness-outline" class="text-xl group-hover:text-brand-yellow transition-colors"></ion-icon>
                <span class="text-sm font-semibold">Session Screen</span>
            </a>
            
            <!-- Client Profile (Inactive State) -->
            <a href="#" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-white rounded-xl transition-all group">
                <ion-icon name="person-outline" class="text-xl group-hover:text-brand-yellow transition-colors"></ion-icon>
                <span class="text-sm font-semibold">My Profile</span>
            </a>

        </nav>

        <!-- Optional: Logout/Settings at bottom of sidebar -->
        <div class="p-4 mb-4">
            <a href="#" class="flex items-center gap-4 px-4 py-4 text-gray-400 hover:text-red-400 rounded-xl transition-all">
                <ion-icon name="log-out-outline" class="text-xl"></ion-icon>
                <span class="text-sm font-semibold">Log Out</span>
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 p-4 md:p-10 mb-20 md:mb-0 overflow-x-hidden">
        
        <!-- Header -->
        <header class="mb-8 flex justify-between items-center">
            <div>
                <div class="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">
                    <span>Overview</span>
                </div>
                <h2 class="text-3xl font-bold text-fitpad-gray uppercase tracking-tight">Client Dashboard</h2>
            </div>
            
            <!-- Client Avatar (Mobile / Quick Profile Access) -->
            <div class="w-12 h-12 rounded-full bg-brand-yellow flex items-center justify-center text-fitpad-gray font-black shadow-sm cursor-pointer hover:brightness-110 transition-all">
                JD
            </div>
        </header>

        <!-- Content goes here -->
        <div class="border-4 border-dashed border-gray-200 rounded-3xl h-[60vh] flex items-center justify-center text-gray-400 font-bold uppercase tracking-widest text-sm">
            [ Main Page Content Block ]
        </div>

    </main>

    <!-- CLIENT MOBILE BOTTOM NAVIGATION -->
    <nav class="md:hidden fixed bottom-0 inset-x-0 bg-fitpad-gray text-white px-2 py-4 flex justify-around items-center z-50 shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.3)]">
        
        <!-- Dashboard (Active) -->
        <a href="#" class="flex flex-col items-center brand-yellow transition-colors">
            <ion-icon name="grid" class="text-2xl"></ion-icon>
            <span class="text-[9px] font-bold mt-1 tracking-widest uppercase">Dash</span>
        </a>
        
        <!-- Session List -->
        <a href="#" class="flex flex-col items-center text-gray-400 hover:text-white transition-colors">
            <ion-icon name="calendar-outline" class="text-2xl"></ion-icon>
            <span class="text-[9px] font-bold mt-1 tracking-widest uppercase">List</span>
        </a>
        
        <!-- Session Screen -->
        <a href="#" class="flex flex-col items-center text-gray-400 hover:text-white transition-colors">
            <ion-icon name="fitness-outline" class="text-2xl"></ion-icon>
            <span class="text-[9px] font-bold mt-1 tracking-widest uppercase">Active</span>
        </a>
        
        <!-- Client Profile -->
        <a href="#" class="flex flex-col items-center text-gray-400 hover:text-white transition-colors">
            <ion-icon name="person-outline" class="text-2xl"></ion-icon>
            <span class="text-[9px] font-bold mt-1 tracking-widest uppercase">Profile</span>
        </a>

    </nav>

</body>
</html>
