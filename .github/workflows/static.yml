name: Deploy Password Protected Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Encrypt Full Directory Structure
        run: |
          # 1. Create a clean folder for the encrypted site
          mkdir -p encrypted

          # 2. Copy ALL folders (images, screens, navs) to the encrypted folder first
          # This ensures .png, .gif, and folder structures are preserved
          cp -r admin-screen client-screen coach-screen images navigator-admin navigator-client navigator-coach encrypted/ 2>/dev/null || true

          # 3. Encrypt the root HTML files
          for file in *.html; do
            if [ -f "$file" ]; then
              staticrypt "$file" "${{ secrets.PAGE_PASSWORD }}" -o "encrypted/$file"
            fi
          done

          # 4. RECURSIVELY encrypt HTML files inside subdirectories
          # This finds every .html file in the subfolders we just copied and encrypts them in place
          find encrypted -name "*.html" -not -path "encrypted/*.html" -exec sh -c 'staticrypt "$1" "${{ secrets.PAGE_PASSWORD }}" -o "$1"' _ {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './encrypted'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
