name: Deploy Password Protected Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Encrypt and Prepare Folders
        run: |
          # 1. Create the deployment directory
          mkdir encrypted

          # 2. Copy ALL your sub-folders into the deployment directory
          # This ensures folders like 'admin-screen' exist in the final site
          cp -r admin-screen client-screen coach-screen images navigator-admin navigator-client navigator-coach encrypted/ 2>/dev/null || true

          # 3. Encrypt every .html file in the root
          # This covers index.html, admin-login.html, etc.
          for file in *.html; do
            if [ -f "$file" ]; then
              echo "Encrypting $file..."
              staticrypt "$file" "${{ secrets.PAGE_PASSWORD }}" -o "encrypted/$file"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # We deploy the 'encrypted' folder which now contains everything
          path: './encrypted'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
