name: Deploy Password Protected Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Build Encrypted Site
        run: |
          # 1. Create a clean staging folder
          mkdir -p staging

          # 2. Copy everything EXCEPT the staging folder to avoid the recursion error
          for item in *; do
            if [ "$item" != "staging" ]; then
              cp -r "$item" staging/
            fi
          done

          # 3. Clean up staging (remove workflow files)
          rm -rf staging/.github

          # 4. RECURSIVELY encrypt every .html file found inside 'staging'
          # This replaces your original HTML with the encrypted versions
          find staging -name "*.html" -exec sh -c 'staticrypt "$1" "${{ secrets.PAGE_PASSWORD }}" -o "$1"' _ {} \;

      - name: Verify Structure
        run: |
          echo "Listing the files being deployed:"
          ls -F staging

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Tells GitHub to host the contents of the staging folder
          path: './staging'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
