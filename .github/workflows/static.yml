name: Deploy Password Protected Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Build Encrypted Site
        run: |
          # 1. Create a clean staging folder
          mkdir -p staging

          # 2. Copy everything EXCEPT the staging folder itself
          for item in *; do
            if [ "$item" != "staging" ]; then
              cp -r "$item" staging/
            fi
          done

          # 3. Clean up staging (remove workflow files)
          rm -rf staging/.github

          # 4. ENCRYPT every .html file recursively
          # We use '-e' to enable a cookie so you stay logged in while navigating folders
          find staging -name "*.html" -type f -exec staticrypt {} "${{ secrets.PAGE_PASSWORD }}" -e -o {} \;

      - name: Verify Encryption (Action Logs)
        run: |
          echo "Checking if index.html is encrypted..."
          # If this shows random characters, it worked. If it shows <html>, it failed.
          head -n 10 staging/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './staging'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
