name: Deploy Password Protected Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Build Encrypted Site
        run: |
          # 1. Create a clean staging folder
          mkdir -p staging

          # 2. Copy EVERYTHING from the root into staging
          # Using '.' copies the current directory content into staging/
          cp -r . staging/

          # 3. Clean up staging (remove the workflow files and the staging folder itself from inside)
          rm -rf staging/.github staging/staging

          # 4. RECURSIVELY encrypt every .html file found anywhere inside 'staging'
          # This replaces your clean HTML with encrypted versions
          find staging -name "*.html" -exec sh -c 'staticrypt "$1" "${{ secrets.PAGE_PASSWORD }}" -o "$1"' _ {} \;

      - name: Verify Staging Structure (Check your Action Logs!)
        run: |
          echo "--- The following files will be live at the root of your URL ---"
          ls -F staging

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This tells GitHub: "Everything INSIDE staging is my website"
          path: './staging'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
