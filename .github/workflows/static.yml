name: Deploy Password Protected Pages

on:
  push:
    branches: ["master"] # Change to "main" if that is your default branch name
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Encrypt All HTML Files
        run: |
          # 1. Create a clean folder for the final site
          mkdir encrypted
          
          # 2. Copy all your asset folders so images/styles don't break
          # Add any other folders you have here (e.g., assets, img, lib)
          cp -r css js images 2>/dev/null || true
          cp -r css js images encrypted/ 2>/dev/null || true
          
          # 3. Encrypt every .html file and put it in the encrypted folder
          # This uses the PAGE_PASSWORD secret you created in Settings
          for file in *.html; do
            if [ -f "$file" ]; then
              staticrypt "$file" "${{ secrets.PAGE_PASSWORD }}" -o "encrypted/$file"
            fi
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # We only upload the encrypted version
          path: './encrypted'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
