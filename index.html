<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitpad Splash</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #535353;
            --brand-yellow: #d8f511; /* Matched to your logo */
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .splash-container {
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .logo {
            width: 180px; /* Adjust based on your preference */
            height: auto;
            margin-bottom: 30px;
            /* Optional: subtle entrance animation */
            animation: fadeIn 1.2s ease-out;
        }

        .brand-name {
            color: var(--brand-yellow);
            font-family: 'Bahnschrift', sans-serif;
            font-weight: 500;
            font-size: 2.5rem;
            text-transform: uppercase;
            /* This mimics the spacing in your image */
            letter-spacing: 0.5rem; 
            margin: 0;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <img src="images/fitpad-fitness.png" alt="Fitpad Logo" class="logo">
        <h1 class="brand-name">FITPAD FITNESS</h1>
    </div>

    <script>
        setTimeout(function() {
            // Change 'client-login.html' to the actual filename of your login page
            window.location.href = 'client-login.html';
        }, 2000); // 2000 milliseconds = 2 seconds
    </script>

</body>
</html>
